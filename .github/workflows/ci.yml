name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null .

      - name: Test
        run: go test -race -count=1 ./...
